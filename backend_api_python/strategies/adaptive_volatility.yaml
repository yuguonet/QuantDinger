# 自适应波动率通用策略（adaptive_volatility）
# 基于 101 只双优股票中位参数 + 板块分层参数，适用于全市场回测
# 生成于 2026-05-01

name: adaptive_volatility
display_name: 自适应波动率,短线打板抓2板
description: |
  RSI 超卖 + 布林下轨 + 放量确认的三重均值回归策略。
  通用参数来自 1266 只 A 股全量回测（2023-05 ~ 2026-03）中 101 只双优股票的中位数。
  板块参数来自各板块双优股票的分层统计，针对不同市场特征做了差异化。

  核心统计（101 只双优股票）：
  - 平均 Sharpe: 0.81 | 平均胜率: 56.2% | 平均收益: +75.5%
  - 平均交易次数: 5.6 | 平均最大回撤: -21.6%

category: reversal
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend

default_active: false
default_priority: 50

instructions: |
  **自适应波动率策略（Adaptive Volatility）**

  核心逻辑：RSI 进入超卖区 + 价格跌破布林带下轨 + 成交量放大 = 超跌反弹信号，买入等待均值回归。

  ## 参数体系

  ### 通用参数（适用于所有板块）

  | 参数 | 值 | 说明 |
  |---|---|---|
  | 布林带周期 | 20 | 固定 |
  | 布林带标准差 | 2.0 | 固定 |
  | 成交量均线周期 | 14 | 固定 |
  | 放量倍数 | 1.3 | 成交量 > MA × 此倍数 |

  ### 板块差异化参数

  先判断标的所属板块，再套用对应参数：

  | 板块 | RSI 周期 | RSI 阈值 | 止损 | 特征说明 |
  |---|---|---|---|---|
  | **创业板** (300/301) | 15 | 33 | 3.5% | WF 通过率最高(20.9%)，信号质量好 |
  | **科创板** (688) | 12 | 32 | 3.5% | 波动大，RSI 需更快响应 |
  | **中小板** (002) | 18 | 35 | 2.5% | 波动温和，阈值宽松，止损要紧 |
  | **沪主板** (600/601/603/605) | 15 | 35 | 4.0% | 大票节奏慢，止损放宽 |
  | **深主板** (000/001) | 15 | 34 | 4.5% | 止损最宽 |

  ## 板块判断方法

  根据股票代码前缀自动识别：
  - `300xxx` / `301xxx` → 创业板
  - `688xxx` → 科创板
  - `002xxx` → 中小板
  - `600xxx` / `601xxx` / `603xxx` / `605xxx` → 沪主板
  - `000xxx` / `001xxx` → 深主板

  ## 信号判定

  ### 买入条件（全部满足）
  1. **RSI 超卖**：RSI({rsi_period}) < {rsi_threshold}
     - 板块参数决定具体阈值
  2. **布林下轨**：收盘价 < 布林带下轨（SMA20 - 2σ）
     - 价格偏离均值 2 个标准差以上，统计上属于极端位置
  3. **放量确认**：成交量 > 14 日均量 × 1.3
     - 缩量下跌后的放量往往是资金进场信号

  ### 卖出条件
  1. **RSI 超买**：RSI({rsi_period}) > (100 - {rsi_threshold})
  2. **布林上轨**：价格突破布林带上轨
  3. **止损触发**：亏损达 -{stop_loss_pct}%

  ### 仓位管理
  - 单只仓位：10%
  - 不加仓（max_pyramiding = 0）
  - 无杠杆

  ## 评分调整
  - 三重确认（RSI + 布林 + 量能）：sentiment_score +12
  - 在 buy_reason 中注明"自适应波动率三重确认 + 板块：{board_name}"

  ## 板块 WF 通过率参考（全量 1266 只统计）

  | 板块 | 总数 | WF>0 | WF 通过率 | 平均得分 | 平均 WF |
  |---|---|---|---|---|---|
  | 创业板 | 249 | 52 | 20.9% | -0.95 | -4.00 |
  | 科创板 | 135 | 24 | 17.8% | +1.29 | -3.61 |
  | 中小板 | 234 | 37 | 15.8% | +0.52 | -3.74 |
  | 沪主板 | 511 | 58 | 11.4% | -0.23 | -4.60 |
  | 深主板 | 133 | 24 | 18.0% | -0.71 | -5.00 |

  **优先级建议**：创业板 > 科创板 ≈ 深主板 > 中小板 > 沪主板

  ## 使用示例

  当分析任意 A 股标的时：
  1. 用 `get_daily_history` 获取近 60 日 K 线数据
  2. 根据股票代码判断板块，套用对应参数
  3. 计算 RSI({rsi_period})、布林带(20, 2.0)、14 日成交量均线
  4. 判断是否同时满足三个买入条件
  5. 如果满足，在 buy_reason 中说明"自适应波动率信号触发，板块：{board_name}"

  ## 设计原理
  - Phase 1 发现：RSI、VWAP、Volume MA、Bollinger、EMA 是 A 股最有效的指标组合
  - 本策略取 RSI + 布林 + 量能三重过滤，降低假信号
  - 板块分层来自 101 只双优股票的分层中位数，反映不同市场的波动特征
  - 科创板 RSI 周期更短（12）因为日内波动大需要快速捕捉；主板止损更宽因为大票节奏慢

  ## 风险提示
  - 单边下跌市中可能连续触发止损
  - 交易频率偏低（平均 5-6 次/3 年），需耐心等待信号
  - 沪主板 WF 通过率最低（11.4%），信号质量相对较差，建议降低仓位
  - 建议配合大盘走势和板块热度使用
