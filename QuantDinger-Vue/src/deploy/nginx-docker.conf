server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE 实时推送：必须关闭 proxy_buffering
        proxy_buffering off;

        proxy_read_timeout 600s;  # 10 minutes for long-running backtests
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;  # 10 minutes for sending response
    }

    # 腾讯行情接口（大盘指数）
    location /qt/ {
        proxy_pass https://qt.gtimg.cn/;
        proxy_set_header Host qt.gtimg.cn;
        proxy_set_header User-Agent $http_user_agent;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
    }

    # 东方财富 - 涨停池
    location /em-zt {
        proxy_pass https://push2ex.eastmoney.com/getTopicZTPool;
        proxy_set_header Host push2ex.eastmoney.com;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
    }

    # 东方财富 - 跌停池
    location /em-dt {
        proxy_pass https://push2ex.eastmoney.com/getTopicDTPool;
        proxy_set_header Host push2ex.eastmoney.com;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
    }

    # 东方财富 - 北向资金
    location /em-north {
        proxy_pass https://push2.eastmoney.com/api/qt/kamt.rtmin/get;
        proxy_set_header Host push2.eastmoney.com;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
    }

    # 东方财富 - 涨跌家数
    location /em-overview {
        proxy_pass https://push2.eastmoney.com/api/qt/ulist.np/get;
        proxy_set_header Host push2.eastmoney.com;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
    }

    # 东方财富 - 连板池
    location /em-lb {
        proxy_pass https://push2ex.eastmoney.com/getTopicLBPool;
        proxy_set_header Host push2ex.eastmoney.com;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
    }

    # SPA routing support
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

